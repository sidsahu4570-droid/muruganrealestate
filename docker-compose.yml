version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: realestate_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - realestate_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realestate_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/realestate
      - JWT_ACCESS_SECRET=supersecretaccesskey123!@#
      - JWT_REFRESH_SECRET=supersecretrefreshkey123!@#
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - realestate_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: realestate_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - realestate_network

volumes:
  mongodb_data:

networks:
  realestate_network:
    driver: bridge
